function fin(){
  const inc=filtered('income'),exp=filtered('expense'),pay=filtered('payroll');
  const gross=inc.reduce((s,r)=>s+(r.total||0),0);
  const totalExp=exp.reduce((s,r)=>s+(r.total||0),0);
  const totalPay=pay.reduce((s,r)=>s+(r.bruto||0),0);
  const net=gross-totalExp-totalPay;
  return{gross,totalExp,totalPay,net,pphFinal:Math.round(gross*0.005),netAfterTax:net-Math.round(gross*0.005),margin:gross?(net/gross*100).toFixed(1):0};
}

// PPH 21
const PTKP={'TK/0':54e6,'TK/1':58.5e6,'TK/2':63e6,'TK/3':67.5e6,'K/0':58.5e6,'K/1':63e6,'K/2':67.5e6,'K/3':72e6};
function calcPPh21(emp){
  const sal=+(emp.salary)||0,annual=sal*12,ptkp=PTKP[emp.ptkp_status]||PTKP['TK/0'];
  const bj=Math.min(annual*.05,6e6),neto=annual-bj,pkp=Math.max(0,Math.round((neto-ptkp)/1000)*1000);
  let tax=0;if(pkp<=60e6)tax=pkp*.05;else if(pkp<=250e6)tax=3e6+(pkp-60e6)*.15;else if(pkp<=500e6)tax=31.5e6+(pkp-250e6)*.25;else tax=94e6+(pkp-500e6)*.30;
  return{annual,ptkp,bj,neto,pkp,annualTax:Math.round(tax),monthlyTax:Math.round(tax/12)};
}
function calcSlip(emp,att={}){
  const sal=+(emp.salary)||0,wd=+(emp.work_days_per_month)||26;
  const hadir=+(att.hadir??wd),ot=+(att.overtime_hours??0);
  const tlain=+(att.tunjangan_lain??0),plain=+(att.potongan_lain??0);
  const prop=Math.round((sal/wd)*hadir);const otPay=Math.round((sal/(wd*8))*1.5*ot);
  const tmakan=+(emp.tunjangan_makan||0),ttrans=+(emp.tunjangan_transport||0),tjab=+(emp.tunjangan_jabatan||0);
  const bruto=prop+otPay+tmakan+ttrans+tjab+tlain;
  const bpjsTkE=Math.round(sal*.02),bpjsKE=Math.round(sal*.01);
  const bpjsTkP=Math.round(sal*(+(emp.bpjs_tk_rate??3.7)/100)),bpjsKP=Math.round(sal*(+(emp.bpjs_kes_rate??4)/100));
  const pph21=calcPPh21(emp).monthlyTax;const totalPot=bpjsTkE+bpjsKE+pph21+plain;
  return{sal,wd,hadir,ot,prop,otPay,tmakan,ttrans,tjab,tlain,bruto:Math.round(bruto),bpjsTkE,bpjsKE,bpjsTkP,bpjsKP,pph21,totalPot:Math.round(totalPot),plain,net:Math.round(bruto-totalPot),totalCost:Math.round(bruto+bpjsTkP+bpjsKP)};
}
function calcLoan(p,r,m){if(!p||!m)return{installment:0,totalPayment:0,totalInterest:0};if(!r||r===0){const i=p/m;return{installment:Math.round(i),totalPayment:Math.round(p),totalInterest:0};}const rt=r/100;const inst=p*rt*Math.pow(1+rt,m)/(Math.pow(1+rt,m)-1);const tot=inst*m;return{installment:Math.round(inst),totalPayment:Math.round(tot),totalInterest:Math.round(tot-p)};}
function genAmort(p,r,m,sd){const rt=r/100,rows=[];let bal=p;const st=sd?new Date(sd):new Date();for(let i=1;i<=m;i++){const d=new Date(st);d.setMonth(d.getMonth()+i-1);const interest=Math.round(bal*rt);const lc=calcLoan(p,r,m);const pp=Math.round(lc.installment-interest);bal=Math.max(0,bal-pp);rows.push({period:i,date:d.toISOString().split('T')[0],month:d.getMonth()+1,year:d.getFullYear(),installment:lc.installment,interest,principal_part:pp,balance:bal});}return rows;}

  openModal('Buat Bukti Potong PPh 23',`

    ${fld('No. Bukti Potong *','bk-no','text',noBukti,'','Auto-generate, dapat diubah',true)}

  <div class="grid2">
    ${fld('NPWP Pihak yang Dipotong','bk-npwp-pihak','text','','00.000.000.0-000.000')}
    ${fld('Alamat','bk-alamat','text','','Opsional')}

  <div class="fld"><label>Kepemilikan NPWP *</label>

  <div id="npwp-warning" class="hidden" style="background:#fee2e2;border-radius:8px;padding:7px 10px;font-size:10px;color:#dc2626;margin-bottom:10px">⚠️ Pihak tidak memiliki NPWP — Tarif PPh 23 menjadi 2× lipat (dikenakan 200% dari tarif normal)</div>

  ${secHead('💼','Objek Pajak & Perhitungan')}
  <div class="fld"><label>Objek Pajak / Jenis Penghasilan *</label>
    <select id="bk-objek" onchange="updateBKCalc()">
      ${objOpts}
    </select>
  </div>
  <div class="grid2" style="margin-bottom:6px">
    <div class="fld"><label>Tarif PPh 23 (%)</label><input type="number" id="bk-tarif" value="2" step="0.1" min="0" oninput="updateBKCalc()" readonly style="background:#f8fafc"></div>
    <div class="fld"><label>Efektif Tarif (setelah NPWP)</label><input type="text" id="bk-tarif-efektif" value="2%" readonly style="background:#f8fafc;font-weight:700;color:#7c3aed"></div>
  </div>
  ${fld('Nilai Bruto / Nilai Transaksi (Rp)','bk-bruto','number',0,'','Nilai penghasilan bruto sebelum dipotong pajak',true)}
  <div class="info-box" id="bk-dpp-info">💡 DPP = Nilai Bruto (sesuai PMK 141/2015, DPP = 100% nilai bruto untuk jasa)</div>

  <div id="bk-calc-preview" style="background:linear-gradient(135deg,#7c3aed,#a855f7);border-radius:11px;padding:13px;color:#fff;margin-bottom:12px">

    <div id="bk-calc-rows">
      <div class="preview-row"><span style="opacity:.75">Nilai Bruto</span><span class="preview-val">Rp 0</span></div>

      <div class="preview-row"><span style="opacity:.75">Tarif PPh 23</span><span class="preview-val">2%</span></div>

  </div>
  <div class="grid2">
    ${fld('No. SSE / NTPN','bk-sse','text','','Nomor Surat Setoran Elektronik')}
    ${fld('No. BPHTB / SSPCP','bk-ssp','text','','Opsional')}
  </div>
  ${fld('Uraian/Keterangan','bk-keterangan','textarea','','Keterangan pekerjaan/transaksi...')}

  </div>

    document.getElementById('bk-bruto').addEventListener('input', updateBKCalc);
    document.getElementById('bk-objek').addEventListener('change', function(){
      const sel=this.options[this.selectedIndex];
      const tarif=sel?parseFloat(sel.dataset.tarif||2):2;
      document.getElementById('bk-tarif').value=tarif;
      updateBKCalc();
    });

    function updateNPWPEffect(){
      const isNpwp=document.getElementById('bk-npwp-ada').value==='Ada';
      document.getElementById('npwp-warning').classList.toggle('hidden',isNpwp);
      updateBKCalc();
    }

    function updateBKCalc(){
      const bruto=parseFloat(document.getElementById('bk-bruto').value)||0;
      const tarif=parseFloat(document.getElementById('bk-tarif').value)||2;
      const isNpwp=document.getElementById('bk-npwp-ada').value==='Ada';
      const efektif=isNpwp?tarif:tarif*2;
      document.getElementById('bk-tarif-efektif').value=efektif+'%'+(isNpwp?'':' (×2 Non-NPWP)');
      const dpp=bruto;
      const pajak=Math.round(dpp*efektif/100);
      const bersih=bruto-pajak;
      const fmt=n=>'Rp '+new Intl.NumberFormat('id-ID').format(Math.round(n)||0);

        <div class="preview-row"><span style="opacity:.75">Nilai Bruto</span><span class="preview-val">\${fmt(bruto)}</span></div>

function saveBK(editId){
  const pihak=getVal('bk-pihak');if(!pihak){showToast('Nama pihak wajib diisi','warning');return;}
  const bruto=getNum('bk-bruto');if(!bruto){showToast('Nilai bruto wajib diisi','warning');return;}
  const tarifBase=getNum('bk-tarif')||2;
  const isNpwp=getVal('bk-npwp-ada')==='Ada';
  const tarifEfektif=isNpwp?tarifBase:tarifBase*2;
  const dpp=bruto;
  const taxAmount=Math.round(dpp*tarifEfektif/100);
  const data={
    no_bukti:getVal('bk-no'),tanggal_transaksi:getVal('bk-tanggal'),month:+getVal('bk-month'),year:+getVal('bk-year'),
    pihak_dipotong:pihak,npwp_pihak:getVal('bk-npwp-pihak'),alamat_pihak:getVal('bk-alamat')||'',
    is_npwp_ada:getVal('bk-npwp-ada'),objek_pajak:getVal('bk-objek'),
    tarif:tarifBase,tarif_efektif:tarifEfektif,bruto,dpp,tax_amount:taxAmount,
    setor_status:getVal('bk-setor-status'),tanggal_setor:getVal('bk-tgl-setor'),
    no_sse:getVal('bk-sse'),no_ssp:getVal('bk-ssp')||'',keterangan:getVal('bk-keterangan'),
    pemotong_nama:S.settings.company_name,pemotong_npwp:S.settings.npwp,pemotong_alamat:S.settings.address
  };
  if(editId)updItem('pph23',editId,data);else addItem('pph23',data);
  closeModal();goSubPage('pph23');showToast('Bukti Potong PPh 23 disimpan ✓','purple');
}

function waKirimBK(id){
  const bk=S.pph23.find(r=>r.id===id);if(!bk)return;
  const s=S.settings;
  // find phone from vendor/client
  const pihak=[...S.client||[],...S.vendor||[]].find(p=>p.name===bk.pihak_dipotong);
  const phone=(pihak?.phone||'').replace(/[^0-9]/g,'');
  const msg=`🧾 *BUKTI POTONG PPH PASAL 23*\n*${s.company_name}*\n\n📄 No. Bukti: *${bk.no_bukti||'—'}*\n📅 Tanggal: ${bk.tanggal_transaksi||'—'}\n\n🏢 *Pihak yang Dipotong:*\n${bk.pihak_dipotong||'—'}\nNPWP: ${bk.npwp_pihak||'—'}\n\n💼 *Objek Pajak:*\n${bk.objek_pajak||'—'}\n\n💰 *Perhitungan:*\nNilai Bruto: Rp ${fmtN(bk.bruto||0)}\nDPP: Rp ${fmtN(bk.dpp||0)}\nTarif PPh 23: ${bk.tarif_efektif||bk.tarif||2}%\n*PPh 23 Dipotong: Rp ${fmtN(bk.tax_amount||0)}*\nDiterima Bersih: Rp ${fmtN((bk.bruto||0)-(bk.tax_amount||0))}\n\nStatus: *${bk.setor_status||'Belum Disetor'}*\n\n_Mohon konfirmasi penerimaan bukti potong ini_\n_${s.company_name}_`;
  if(phone){
    window.open(`https://wa.me/${phone.startsWith('0')?'62'+phone.slice(1):phone}?text=${encodeURIComponent(msg)}`,'_blank');
  } else {
    // Copy to clipboard
    navigator.clipboard?.writeText(msg).then(()=>showToast('Pesan disalin ke clipboard 📋','purple')).catch(()=>{
      openModal('Kirim via WhatsApp',`<div class="purple-box mb8">No. WhatsApp pihak yang dipotong tidak ditemukan. Salin pesan berikut:</div><textarea style="width:100%;height:200px;padding:10px;border:1px solid #e2e8f0;border-radius:8px;font-size:11px;font-family:monospace">${msg}</textarea><div class="btn-row"><button class="btn btn-ghost btn-flex1" onclick="closeModal()">Tutup</button><button class="btn btn-success btn-flex1" onclick="navigator.clipboard.writeText(document.querySelector('textarea').value);showToast('Disalin ✓')">📋 Salin</button></div>`);
    });
    showToast('No. WA tidak ditemukan, cek datalist vendor/klien','warning');
  }
}

function openTxAdd(col,title){const m=Filter.month||new Date().getMonth()+1,y=Filter.year||new Date().getFullYear();const isInc=col==='income';txItems=[];txAttachments=[];openModal('Tambah '+title,txForm(col,isInc,{month:m,year:y,date:today()}));}
function openTxEdit(col,id){const item=S[col].find(r=>r.id===id);if(!item)return;const isInc=col==='income';txItems=JSON.parse(JSON.stringify(item.items||[]));txAttachments=JSON.parse(JSON.stringify(item.attachments||[]));openModal('Edit '+(isInc?'Pendapatan':'Pengeluaran'),txForm(col,isInc,item,id));}
function txForm(col,isInc,data={},editId=''){

}
function addTxItem(){txItems.push({name:'',item_type:'Barang',qty:1,unit:'pcs',price:0});renderTxItems();}
function renderTxItems(){const wrap=document.getElementById('tx-items-wrap');if(!wrap)return;wrap.innerHTML=txItems.map((item,i)=>`<div style="background:#f8fafc;border-radius:10px;padding:10px;margin-bottom:7px;border:1px solid #e2e8f0"><div class="flex-sb mb6"><span style="font-size:10px;font-weight:700;color:#475569">Item #${i+1}</span><button class="btn btn-xs btn-danger" onclick="removeTxItem(${i})">✕</button></div><div class="fld"><label>Nama</label><input type="text" value="${item.name||''}" oninput="txItems[${i}].name=this.value" placeholder="Nama item..."></div><div class="grid3"><div class="fld"><label>Qty</label><input type="number" value="${item.qty||1}" oninput="txItems[${i}].qty=+this.value;calcTxTotal()"></div><div class="fld"><label>Satuan</label><select onchange="txItems[${i}].unit=this.value">${['pcs','set','kg','liter','meter','jam','hari','box'].map(u=>`<option${u===item.unit?' selected':''}>${u}</option>`).join('')}</select></div><div class="fld"><label>Harga(Rp)</label><input type="number" value="${item.price||0}" oninput="txItems[${i}].price=+this.value;calcTxTotal()"></div></div><div style="display:flex;justify-content:space-between;background:#fff;border-radius:7px;padding:5px 9px;border:1px solid rgba(15,76,129,.12);font-size:11px"><span style="color:#475569">Subtotal</span><span style="font-weight:800;color:#0f4c81">${fmtRp((+item.qty||0)*(+item.price||0))}</span></div></div>`).join('');calcTxTotal();}
function removeTxItem(i){txItems.splice(i,1);renderTxItems();}
function calcTxTotal(){const lt=txItems.reduce((s,l)=>s+(+l.qty||0)*(+l.price||0),0);const prev=document.getElementById('tx-total-preview');if(prev&&lt>0){prev.innerHTML=`<div style="background:linear-gradient(135deg,#0a3560,#0f4c81);border-radius:10px;padding:10px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;color:#fff"><div style="font-size:11px;opacity:.8">Total (${txItems.length} item)</div><div style="font-size:16px;font-weight:800">${fmtRp(lt)}</div></div>`;const ti=document.getElementById('tx-total');if(ti)ti.value=lt;}else if(prev)prev.innerHTML='';}
function saveTx(col,editId){const total=getNum('tx-total');const data={invoice_no:getVal('tx-inv'),date:getVal('tx-date'),month:+getVal('tx-month'),year:+getVal('tx-year'),client_vendor:getVal('tx-cv'),category:getVal('tx-cat'),payment_status:getVal('tx-status'),total,description:getVal('tx-desc'),items:txItems,attachments:txAttachments};if(editId)updItem(col,editId,data);else addItem(col,data);closeModal();goPage(CPage);}

loan.tenor||0} angsuran</span></div><div class="progress-wrap"><div class="progress-bar" style="background:${pct===100?'#16a34a':pct>60?'#0f4c81':pct>30?'#d97706':'#dc2626'};width:${pct}%"></div></div></div>`;}).join('');
  const payHist=(S.loan_payment||[]).slice().reverse().map(p=>`<div class="item-card" style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:12px;font-weight:700;color:#1e293b">${p.bank_name||'—'}</div><div class="txt-xs">${p.date} • ${p.type||'Angsuran'}</div></div><div style="text-align:right"><div style="font-size:13px;font-weight:800;color:#16a34a">${fmtRp(p.amount||0)}</div><button class="btn btn-xs btn-danger mt4" onclick="confirmDel('loan_payment','${p.id}',this)">🗑️</button></div></div>`).join('');
  const yr=Filter.year||new Date().getFullYear();const mPayData=Array.from({length:12},(_,i)=>{const m=i+1;const pays=(S.loan_payment||[]).filter(p=>+p.month===m&&+p.year===yr).reduce((s,p)=>s+(p.amount||0),0);const inc=(S.income||[]).filter(r=>+r.month===m&&+r.year===yr).reduce((s,r)=>s+(r.total||0),0);return{m,pays,inc};});
  const totalInc2=mPayData.reduce((s,d)=>s+d.inc,0),totalCic=mPayData.reduce((s,d)=>s+d.pays,0),dscr=totalCic>0&&totalInc2>0?(totalInc2/totalCic).toFixed(2):'N/A';
  return `<div class="page-hdr"><div class="page-title">🏦 Bank & Pinjaman</div><button class="btn btn-teal btn-sm" onclick="openAddLoan()">+ Tambah Pinjaman</button></div>
<div class="tab-row"><button class="tab-btn ${tab==='list'?'active':''}" onclick="setBankTab('list')">Pinjaman</button><button class="tab-btn ${tab==='payment'?'active':''}" onclick="setBankTab('payment')">Riwayat Bayar</button><button class="tab-btn ${tab==='analysis'?'active':''}" onclick="setBankTab('analysis')">Analisis</button></div>
<div class="kpi-grid">${kpiCard('Total Pokok',fmtRp(total),'#ea580c','💵')}${kpiCard('Sisa Hutang',fmtRp(outstanding),'#dc2626','📉')}${kpiCard('Total Dibayar',fmtRp(paid),'#16a34a','✅')}${kpiCard('Cicilan/Bln',fmtRp(burden),'#d97706','📅')}</div>
${tab==='list'?(cards||`<div style="text-align:center;padding:36px;color:#94a3b8;background:#fff;border-radius:14px"><div style="font-size:28px;margin-bottom:6px">🏦</div><button class="btn btn-teal btn-sm" onclick="openAddLoan()">+ Tambah Pinjaman</button></div>`):
tab==='payment'?`<div class="grad-green mb8"><div style="font-size:11px;opacity:.8">Total Pembayaran</div><div style="font-size:18px;font-weight:800">${fmtRp((S.loan_payment||[]).reduce((s,p)=>s+(p.amount||0),0))}</div></div>${payHist||`<div style="text-align:center;padding:24px;color:#94a3b8">Belum ada riwayat</div>`}`:
`<div class="item-card mb10"><div style="font-size:12px;font-weight:800;margin-bottom:9px">📊 Analisis Kemampuan Bayar ${yr}</div>${[['Total Pendapatan',fmtRp(totalInc2),'#16a34a'],['Total Cicilan Dibayar',fmtRp(totalCic),'#ea580c'],['Rasio Cicilan/Pendapatan',totalInc2?(totalCic/totalInc2*100).toFixed(1)+'%':'—','#dc2626'],['DSCR',dscr,+dscr>=1.5?'#16a34a':+dscr>=1?'#d97706':'#dc2626']].map(([l,v,c])=>`<div class="flex-sb" style="padding:5px 0;border-bottom:1px solid #f8fafc;font-size:11px"><span style="color:#475569">${l}</span><span style="font-weight:800;color:${c}">${v}</span></div>`).join('')}<div class="info-box mt4">💡 DSCR ≥ 1.5 = Sehat | 1.0-1.5 = Perlu Perhatian | &lt;1.0 = Berisiko</div></div>
${loans.map(loan=>{const lp=(S.loan_payment||[]).filter(p=>p.loan_id===loan.id);const tp=lp.reduce((s,p)=>s+(p.amount||0),0);const rem=Math.max(0,loan.outstanding||loan.principal||0);const eta=loan.installment&&rem?Math.ceil(rem/loan.installment):0;const prog=loan.principal?(tp/loan.principal*100).toFixed(1):0;return `<div class="item-card mb8"><div style="font-weight:700;font-size:12px;color:#1e293b;margin-bottom:6px">${loan.bank_name} — ${loan.loan_type}</div>${[['Pokok Awal',fmtRp(loan.principal||0)],['Total Dibayar',fmtRp(tp)],['Sisa Pokok',fmtRp(rem)],['Est. Lunas',eta>0?eta+' bln lagi':'Lunas/N/A'],['Progres',prog+'%']].map(([l,v])=>`<div class="flex-sb txt-sm" style="padding:2px 0"><span>${l}</span><span style="font-weight:700">${v}</span></div>`).join('')}<div class="progress-wrap mt4"><div class="progress-bar" style="background:#16a34a;width:${Math.min(100,prog)}%"></div></div></div>`;}).join('')}`}`;

function setBankTab(t){CTab.bank=t;goSubPage('bank');}
function openAddLoan(){openModal('Tambah Pinjaman',loanForm());}
function openEditLoan(id){const loan=S.loan.find(l=>l.id===id);if(!loan)return;openModal('Edit Pinjaman',loanForm(loan,id));}
function loanForm(data={},editId=''){
  const types=['Modal Usaha','Investasi','KPR','KKB','Multiguna','Revolving','Konstruksi','Lainnya'];const statuses=['Aktif (Berjalan)','Lunas (Selesai)','Macet','Restrukturisasi'];const intTypes=['Flat','Efektif/Anuitas','Fixed','Floating'];
  return `${secHead('🏦','Informasi Bank')}<div class="grid2">${fld('Nama Bank *','ln-bank','text',data.bank_name||'')}<div class="fld"><label>Jenis Pinjaman</label><select id="ln-type">${types.map(t=>`<option${t===data.loan_type?' selected':''}>${t}</option>`).join('')}</select></div>${fld('No. Rekening','ln-accno','text',data.account_number||'')}${fld('Nama Kontak','ln-contact','text',data.contact_person||'')}</div>${secHead('💰','Detail Pinjaman')}<div class="grid2">${fld('Pokok Pinjaman (Rp) *','ln-principal','number',data.principal||0)}${fld('Suku Bunga (%/bln)','ln-rate','number',data.interest_rate||0)}${fld('Tenor (bulan)','ln-tenor','number',data.tenor||0)}<div class="fld"><label>Jenis Bunga</label><select id="ln-int-type">${intTypes.map(t=>`<option${t===data.interest_type?' selected':''}>${t}</option>`).join('')}</select></div>${fld('Tgl Mulai','ln-start','date',data.start_date||today())}<div class="fld"><label>Status</label><select id="ln-status">${statuses.map(t=>`<option${t===data.status?' selected':''}>${t}</option>`).join('')}</select></div></div>${fld('Keterangan','ln-note','textarea','',data.note||'')}${fld('Jaminan/Agunan','ln-collateral','text',data.collateral||'')}<div id="loan-preview"></div><div class="btn-row"><button class="btn btn-ghost btn-flex1" onclick="closeModal()">Batal</button><button class="btn btn-teal btn-flex1" onclick="saveLoan('${editId}')">Simpan Pinjaman</button></div>
  <script>function updateLP(){const p=parseFloat(document.getElementById('ln-principal').value)||0;const r=parseFloat(document.getElementById('ln-rate').value)||0;const t=parseInt(document.getElementById('ln-tenor').value)||0;if(!p||!t){document.getElementById('loan-preview').innerHTML='';return;}const inst=p&&t?(r?Math.round(p*(r/100)*Math.pow(1+r/100,t)/(Math.pow(1+r/100,t)-1)):Math.round(p/t)):0;const total=inst*t,interest=total-p;const fmt=n=>'Rp '+new Intl.NumberFormat('id-ID').format(Math.round(n)||0);document.getElementById('loan-preview').innerHTML=\`<div class="preview-box"><div style="font-size:11px;font-weight:800;margin-bottom:8px;opacity:.9">⚡ Simulasi Pinjaman</div>\${[['Pokok',fmt(p)],['Cicilan/Bln',fmt(inst)],['Total Bayar',fmt(total)],['Total Bunga',fmt(interest)]].map(([l,v])=>\`<div class="preview-row"><span style="opacity:.75">\${l}</span><span class="preview-val">\${v}</span></div>\`).join('')}</div>\`;}['ln-principal','ln-rate','ln-tenor'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('input',updateLP);});updateLP();<\/script>`;
}
function saveLoan(editId){const bank=getVal('ln-bank');if(!bank){showToast('Nama bank wajib diisi','warning');return;}const principal=getNum('ln-principal'),rate=getNum('ln-rate'),tenor=parseInt(getVal('ln-tenor'))||0;const lc=calcLoan(principal,rate,tenor);const data={bank_name:bank,loan_type:getVal('ln-type'),account_number:getVal('ln-accno'),contact_person:getVal('ln-contact'),principal,interest_rate:rate,tenor,interest_type:getVal('ln-int-type'),start_date:getVal('ln-start'),status:getVal('ln-status'),note:getVal('ln-note'),collateral:getVal('ln-collateral'),installment:lc.installment,total_payment:lc.totalPayment,total_interest:lc.totalInterest,outstanding:principal,paid_amount:0};if(editId)updItem('loan',editId,data);else addItem('loan',data);closeModal();goSubPage('bank');}
function openPayLoan(id){const loan=S.loan.find(l=>l.id===id);if(!loan)return;const lp=(S.loan_payment||[]).filter(p=>p.loan_id===id);openModal('Bayar — '+loan.bank_name,`<div class="info-box">Sisa: <b style="color:#dc2626">${fmtRp(loan.outstanding||loan.principal||0)}</b> • Cicilan Normal: <b>${fmtRp(loan.installment||0)}</b><br>Pembayaran ke-${lp.length+1} dari ${loan.tenor} angsuran</div><div class="fld"><label>Jenis Pembayaran</label><select id="pay-type">${['Angsuran','Pelunasan Lebih Awal','Pelunasan Penuh','Penalti','Lainnya'].map(t=>`<option>${t}</option>`).join('')}</select></div>${fld('Jumlah Bayar (Rp) *','pay-amount','number',loan.installment||0)}<div class="grid2">${fld('Tanggal Bayar','pay-date','date',today())}<div class="fld"><label>Bulan</label><select id="pay-month">${monthOpts(new Date().getMonth()+1)}</select></div></div>${fld('Tahun','pay-year','number',new Date().getFullYear())}${fld('Keterangan','pay-note','text','')}<div class="btn-row"><button class="btn btn-ghost btn-flex1" onclick="closeModal()">Batal</button><button class="btn btn-success btn-flex1" onclick="savePayment('${id}')">✅ Simpan Pembayaran</button></div>`);}
function savePayment(loanId){const amount=getNum('pay-amount');if(!amount){showToast('Jumlah wajib diisi','warning');return;}const loan=S.loan.find(l=>l.id===loanId);if(!loan)return;const payData={loan_id:loanId,bank_name:loan.bank_name,loan_type:loan.loan_type,type:getVal('pay-type'),amount,date:getVal('pay-date'),month:+getVal('pay-month'),year:+getVal('pay-year'),note:getVal('pay-note')};addItem('loan_payment',payData);const newPaid=(loan.paid_amount||0)+amount;const newOut=Math.max(0,(loan.outstanding||loan.principal||0)-amount);updItem('loan',loanId,{paid_amount:newPaid,outstanding:newOut,status:newOut<=0?'Lunas (Selesai)':'Aktif (Berjalan)'});closeModal();goSubPage('bank');showToast('Pembayaran berhasil ✓');}
function openAmort(id){const loan=S.loan.find(l=>l.id===id);if(!loan)return;const rows=genAmort(loan.principal||0,loan.interest_rate||0,loan.tenor||0,loan.start_date);const paidCount=(S.loan_payment||[]).filter(p=>p.loan_id===id).length;const tableRows=rows.map((r,i)=>`<tr class="${i<paidCount?'amort-paid':''}"><td style="padding:5px;text-align:right;font-weight:700;color:${i<paidCount?'#16a34a':'#64748b'}">${i<paidCount?'✓':r.period}</td><td style="padding:5px;text-align:right;color:#64748b">${r.date}</td><td style="padding:5px;text-align:right;font-weight:600">${fmtN(r.installment)}</td><td style="padding:5px;text-align:right;color:#dc2626">${fmtN(r.interest)}</td><td style="padding:5px;text-align:right;color:#16a34a">${fmtN(r.principal_part)}</td><td style="padding:5px;text-align:right;font-weight:700;color:${r.balance===0?'#16a34a':'#0f4c81'}">${fmtN(r.balance)}</td></tr>`).join('');openModal('📊 Amortisasi — '+loan.bank_name,`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px;background:#f8fafc;border-radius:9px;padding:8px;margin-bottom:10px">${[['Pokok',fmtRp(loan.principal||0)],['Bunga/Bln',loan.interest_rate+'%'],['Tenor',loan.tenor+' bln'],['Cicilan/Bln',fmtRp(loan.installment||0)],['Total Bayar',fmtRp(loan.total_payment||0)],['Sudah',paidCount+' angsuran']].map(([l,v])=>`<div style="text-align:center"><div style="font-size:9px;color:#94a3b8;font-weight:700">${l}</div><div style="font-size:10px;font-weight:800">${v}</div></div>`).join('')}</div><div class="tbl-wrap" style="max-height:50vh;overflow-y:auto"><table class="tbl" style="min-width:380px"><thead class="amort-head"><tr><th style="text-align:right">#</th><th style="text-align:right">Tanggal</th><th style="text-align:right">Cicilan</th><th style="text-align:right">Bunga</th><th style="text-align:right">Pokok</th><th style="text-align:right">Sisa</th></tr></thead><tbody>${tableRows}</tbody></table></div><button class="btn btn-ghost btn-w100 mt4" onclick="closeModal()">Tutup</button>`);}

d('emp-tmakan').value)||0)+(parseFloat(document.getElementById('emp-ttrans').value)||0)+(parseFloat(document.getElementById('emp-tjab').value)||0);const net=bruto-Math.round(sal*.02)-Math.round(sal*.01)-mt;const fmt=n=>'Rp '+new Intl.NumberFormat('id-ID').format(Math.round(n)||0);document.getElementById('emp-preview').innerHTML=\`<div class="preview-box"><div style="font-size:11px;font-weight:800;margin-bottom:7px;opacity:.9">👁️ Preview Gaji</div>\${[['Bruto',fmt(bruto)],['BPJS TK+Kes (3%)',fmt(Math.round(sal*.02)+Math.round(sal*.01))],['PPh 21/Bln',fmt(mt)],['Take Home',fmt(net)]].map(([l,v])=>\`<div class="preview-row"><span style="opacity:.75">\${l}</span><span class="preview-val">\${v}</span></div>\`).join('')}</div>\`;}['emp-salary','emp-ptkp','emp-tmakan','emp-ttrans','emp-tjab'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('input',updateEPrev);});updateEPrev();<\/script>`;
}

function payrollForm(data={}){
  const employees=S.employee||[];const m=Filter.month||new Date().getMonth()+1,y=Filter.year||new Date().getFullYear();
  return `${secHead('👤','Pilih Karyawan')}<div class="fld"><label>Karyawan *</label><select id="pay-emp-id" onchange="updatePayPreview()"><option value="">-- Pilih Karyawan --</option>${employees.map(e=>`<option value="${e.id}"${e.id===data.employee_id?' selected':''}>${e.name} (${e.position||'—'})</option>`).join('')}</select></div><div id="emp-info-box"></div>${secHead('📅','Periode & Kehadiran')}<div class="grid2"><div class="fld"><label>Bulan</label><select id="pay-month" onchange="updatePayPreview()">${monthOpts(data.month||m)}</select></div>${fld('Tahun','pay-yr','number',data.year||y)}<div class="fld"><label>Hari Hadir</label><input type="number" id="pay-hadir" value="${data.hadir??26}" min="0" oninput="updatePayPreview()"></div><div class="fld"><label>Lembur (jam)</label><input type="number" id="pay-ot" value="${data.overtime_hours??0}" min="0" oninput="updatePayPreview()"></div><div class="fld"><label>Sakit (hari)</label><input type="number" id="pay-sakit" value="${data.sakit??0}" min="0"></div><div class="fld"><label>Izin (hari)</label><input type="number" id="pay-izin" value="${data.izin??0}" min="0"></div></div>${secHead('➕','Tambahan & Potongan')}<div class="grid2"><div class="fld"><label>Tunjangan Lain (Rp)</label><input type="number" id="pay-tlain" value="${data.tunjangan_lain??0}" min="0" oninput="updatePayPreview()"><div class="hint">Bonus, THR, dll</div></div><div class="fld"><label>Potongan Lain (Rp)</label><input type="number" id="pay-plain" value="${data.potongan_lain??0}" min="0" oninput="updatePayPreview()"><div class="hint">Kasbon, denda</div></div></div><div id="pay-preview-box"></div><div class="btn-row"><button class="btn btn-ghost btn-flex1" onclick="closeModal()">Batal</button><button class="btn btn-primary btn-flex1" onclick="savePayroll('')">Simpan Slip Gaji</button></div>
  <script>const _emps=${JSON.stringify(S.employee||[])};function updatePayPreview(){const empId=document.getElementById('pay-emp-id').value;if(!empId){document.getElementById('pay-preview-box').innerHTML='';document.getElementById('emp-info-box').innerHTML='';return;}const emp=_emps.find(e=>e.id===empId);if(!emp)return;document.getElementById('emp-info-box').innerHTML=\`<div class="info-box mb8">Gaji Pokok: <b>Rp \${new Intl.NumberFormat('id-ID').format(emp.salary||0)}</b> | PTKP: <b>\${emp.ptkp_status||'TK/0'}</b> | Hari Kerja: <b>\${emp.work_days_per_month||26}</b></div>\`;const hadir=parseFloat(document.getElementById('pay-hadir').value)||0;const ot=parseFloat(document.getElementById('pay-ot').value)||0;const tlain=parseFloat(document.getElementById('pay-tlain').value)||0;const plain=parseFloat(document.getElementById('pay-plain').value)||0;const sal=emp.salary||0;const wd=emp.work_days_per_month||26;const prop=Math.round((sal/wd)*hadir);const otPay=Math.round((sal/(wd*8))*1.5*ot);const tmakan=emp.tunjangan_makan||0,ttrans=emp.tunjangan_transport||0,tjab=emp.tunjangan_jabatan||0;const bruto=prop+otPay+tmakan+ttrans+tjab+tlain;const annual=sal*12;const ptkpV=${JSON.stringify(PTKP)};const p=ptkpV[emp.ptkp_status||'TK/0']||54e6;const bj=Math.min(annual*.05,6e6);const neto=annual-bj;const pkp=Math.max(0,Math.round((neto-p)/1000)*1000);let tax=0;if(pkp<=60e6)tax=pkp*.05;else if(pkp<=250e6)tax=3e6+(pkp-60e6)*.15;else if(pkp<=500e6)tax=31.5e6+(pkp-250e6)*.25;else tax=94e6+(pkp-500e6)*.30;const pph21=Math.round(tax/12);const bpjsTkE=Math.round(sal*.02),bpjsKE=Math.round(sal*.01);const totalPot=bpjsTkE+bpjsKE+pph21+plain;const net=Math.round(bruto-totalPot);const fmt=n=>'Rp '+new Intl.NumberFormat('id-ID').format(Math.round(n)||0);document.getElementById('pay-preview-box').innerHTML=\`<div class="preview-box"><div style="font-size:11px;font-weight:800;margin-bottom:7px;opacity:.9">⚡ Preview Slip Gaji</div>\${[['Gaji Proporsional',fmt(prop),'normal'],['Upah Lembur',fmt(otPay),'normal'],['Tunjangan',fmt(tmakan+ttrans+tjab+tlain),'normal'],['─ Bruto ─',fmt(bruto),'bold'],['BPJS TK+Kes','-'+fmt(bpjsTkE+bpjsKE),'red'],['PPh 21','-'+fmt(pph21),'red'],['─ Total Potong ─','-'+fmt(totalPot),'bold-red']].map(([l,v,t])=>\`<div class="preview-row" style="font-weight:\${t.includes('bold')?800:400}"><span style="opacity:\${t==='normal'?.8:1}">\${l}</span><span class="preview-val" style="color:\${t.includes('red')?'#fca5a5':'#fff'}">\${v}</span></div>\`).join('')}<div style="border-top:1px solid rgba(255,255,255,.3);margin-top:7px;padding-top:7px;display:flex;justify-content:space-between;font-size:13px;font-weight:800"><span>TAKE HOME PAY</span><span style="color:#86efac">\${fmt(net)}</span></div></div>\`;}updatePayPreview();<\/script>`;

function savePayroll(editId){const empId=getVal('pay-emp-id');if(!empId){showToast('Pilih karyawan','warning');return;}const emp=S.employee.find(e=>e.id===empId);if(!emp)return;const hadir=getNum('pay-hadir'),ot=getNum('pay-ot'),sakit=getNum('pay-sakit'),izin=getNum('pay-izin'),tlain=getNum('pay-tlain'),plain=getNum('pay-plain');const slip=calcSlip(emp,{hadir,overtime_hours:ot,tunjangan_lain:tlain,potongan_lain:plain});const pph=calcPPh21(emp);const data={employee_id:empId,name:emp.name,position:emp.position,salary:slip.sal,work_days_per_month:slip.wd,month:+getVal('pay-month'),year:+getVal('pay-yr'),hadir,sakit,izin,cuti:0,overtime_hours:ot,tunjangan_lain:tlain,potongan_lain:plain,gajiProporsi:slip.prop,overtimePay:slip.otPay,tunjanganMakan:slip.tmakan,tunjanganTransport:slip.ttrans,tunjanganJabatan:slip.tjab,bruto:slip.bruto,bpjsTkKaryawan:slip.bpjsTkE,bpjsKesKaryawan:slip.bpjsKE,bpjsTkPerusahaan:slip.bpjsTkP,bpjsKesPerusahaan:slip.bpjsKP,pph21:slip.pph21,totalPotongan:slip.totalPot,netSalary:slip.net,net_salary:slip.net,totalBiayaPerusahaan:slip.totalCost};if(editId)updItem('payroll',editId,data);else addItem('payroll',data);closeModal();goSubPage('payroll');}
function viewSlip(id){const item=S.payroll.find(r=>r.id===id);if(!item)return;openModal('Slip Gaji — '+item.name,`<div class="bg-light p10 mb10 txt-sm"><b>Periode:</b> ${MONTHS[item.month||1]} ${item.year} | <b>Jabatan:</b> ${item.position||'—'}<br>Hadir: ${item.hadir||0} | Sakit: ${item.sakit||0} | Izin: ${item.izin||0} | Lembur: ${item.overtime_hours||0}j</div>${[['PENGHASILAN',null,'section'],['Gaji Proporsional',item.gajiProporsi||0,false],['Upah Lembur',item.overtimePay||0,false],['Tunjangan Makan',item.tunjanganMakan||0,false],['Total Bruto',item.bruto||0,true],['POTONGAN',null,'section'],['BPJS TK Karyawan',-(item.bpjsTkKaryawan||0),true,'neg'],['BPJS Kes Karyawan',-(item.bpjsKesKaryawan||0),false,'neg'],['PPh Pasal 21',-(item.pph21||0),false,'neg'],['Total Potongan',-(item.totalPotongan||0),true,'neg']].map((row,i)=>{if(row[2]==='section')return `<div style="font-size:11px;font-weight:800;color:#0f4c81;margin:8px 0 4px;border-bottom:1px solid rgba(15,76,129,.15);padding-bottom:2px">${row[0]}</div>`;const[l,v,bold,neg]=row;return v!==null&&Math.abs(v)>0?`<div class="flex-sb" style="padding:4px 0;border-bottom:1px solid #f8fafc;font-size:11px"><span style="color:#64748b;font-weight:${bold?700:400}">${l}</span><span style="font-weight:${bold?800:600};color:${neg?'#dc2626':'#16a34a'}">${v<0?'-':''}${fmtRp(Math.abs(v))}</span></div>`:'';}).join('')}<div class="flex-sb" style="margin-top:6px;padding:9px 0;border-top:2px solid #0f4c81;font-size:14px;font-weight:800"><span>GAJI DITERIMA</span><span style="color:#0f4c81">${fmtRp(item.netSalary||item.net_salary||0)}</span></div><div class="btn-row"><button class="btn btn-ghost btn-flex1" onclick="printSlip('${id}')">🖨️ Cetak</button><button class="btn btn-primary btn-flex1" onclick="closeModal()">Tutup</button></div>`);}
function printSlip(id){const item=S.payroll.find(r=>r.id===id);if(!item)return;const s=S.settings;const w=window.open('','_blank');w.document.write(`<html><head><title>Slip Gaji</title><style>body{font-family:Arial;padding:20px;max-width:480px;margin:auto;font-size:12px}.h{text-align:center;border-bottom:2px solid #0f4c81;padding-bottom:10px;margin-bottom:12px}h2{color:#0f4c81;margin:0;font-size:15px}.row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #f1f5f9}.sec{font-weight:800;color:#0f4c81;margin:8px 0 4px;font-size:11px;text-transform:uppercase}.tot{font-weight:800;font-size:14px;color:#16a34a;border-top:2px solid #0f4c81;padding-top:6px;margin-top:6px;display:flex;justify-content:space-between}.red{color:#dc2626}</style></head><body><div class="h"><h2>${s.company_name}</h2><p style="margin:2px 0;font-size:10px;color:#64748b">${s.address||''}</p><div style="font-weight:700;margin-top:4px">SLIP GAJI</div></div><div class="row"><span>Nama</span><b>${item.name}</b></div><div class="row"><span>Jabatan</span><span>${item.position||'—'}</span></div><div class="row"><span>Periode</span><b>${MONTHS[item.month||1]} ${item.year}</b></div><div class="row"><span>Kehadiran</span><span>Hadir ${item.hadir||0} | Sakit ${item.sakit||0} | Izin ${item.izin||0}</span></div><div class="sec">PENGHASILAN</div><div class="row"><span>Gaji Proporsional</span><span>Rp ${fmtN(item.gajiProporsi||0)}</span></div>${item.overtimePay>0?`<div class="row"><span>Upah Lembur</span><span>Rp ${fmtN(item.overtimePay)}</span></div>`:''}<div class="row" style="font-weight:700"><span>Total Bruto</span><span>Rp ${fmtN(item.bruto||0)}</span></div><div class="sec">POTONGAN</div><div class="row red"><span>BPJS TK Karyawan</span><span>-Rp ${fmtN(item.bpjsTkKaryawan||0)}</span></div><div class="row red"><span>BPJS Kes Karyawan</span><span>-Rp ${fmtN(item.bpjsKesKaryawan||0)}</span></div><div class="row red"><span>PPh Pasal 21</span><span>-Rp ${fmtN(item.pph21||0)}</span></div><div class="tot"><span>GAJI DITERIMA</span><span>Rp ${fmtN(item.netSalary||item.net_salary||0)}</span></div><div style="margin-top:16px;display:flex;justify-content:space-between;font-size:10px"><div style="text-align:center;width:45%">Penerima,<br><br><br><div style="border-top:1px solid #333">${item.name}</div></div><div style="text-align:center;width:45%">Bintan, ${new Date().toLocaleDateString('id-ID')}<br><br><br><div style="border-top:1px solid #333">${s.company_name}</div></div></div>${s.bank_name?`<div style="margin-top:14px;padding:7px;background:#f8fafc;border-radius:6px;font-size:10px"><b>Transfer:</b> ${s.bank_name} • ${s.account_number} • a/n ${s.account_holder}</div>`:''}</body></html>`);w.document.close();setTimeout(()=>w.print(),400);showToast('Siap cetak 🖨️');}

// ═══════════════ GENERIC PAGES ═══════════════
function renderGenPage(col,title,icon){const items=S[col]||[];const cards=items.map(item=>`<div class="item-card"><div class="flex-sb"><div style="flex:1"><div style="font-size:12px;font-weight:700;color:#1e293b">${item.name||'—'}</div><div class="txt-xs mt4">${item.phone||item.category||item.client||item.status||''} ${item.email?'• '+item.email:''}</div>${item.status?`<div class="mt4">${badge(item.status)}</div>`:''}</div><div class="flex-row"><button class="btn btn-xs" style="background:#fef3c7;color:#92400e" onclick="openEditGen('${col}','${item.id}','${title}')">✏️</button><button class="btn btn-xs btn-danger" onclick="confirmDel('${col}','${item.id}',this)">🗑️</button></div></div></div>`).join('');return `<div class="page-hdr"><div class="page-title">${icon} ${title}</div><button class="btn btn-primary btn-sm" onclick="openAddGen('${col}','${title}')">+ Tambah</button></div><input class="search-box" placeholder="Cari ${title}...">${cards||`<div style="text-align:center;padding:36px;color:#94a3b8;background:#fff;border-radius:14px"><div style="font-size:28px;margin-bottom:6px">${icon}</div><button class="btn btn-primary btn-sm" onclick="openAddGen('${col}','${title}')">+ Tambah ${title}</button></div>`}`;}
function getGenFields(col){if(col==='client')return [{k:'name',l:'Nama Klien',t:'text',req:true},{k:'npwp',l:'NPWP'},{k:'phone',l:'Telepon'},{k:'email',l:'Email',t:'email'},{k:'address',l:'Alamat'},{k:'contact_person',l:'Contact Person'},{k:'note',l:'Catatan'}];if(col==='vendor')return [{k:'name',l:'Nama Vendor',t:'text',req:true},{k:'category',l:'Kategori',t:'select',opts:['Supplier','Jasa','Kontraktor','Lainnya']},{k:'phone',l:'Telepon'},{k:'email',l:'Email',t:'email'},{k:'address',l:'Alamat'}];if(col==='inventory')return [{k:'name',l:'Nama Item',t:'text',req:true},{k:'category',l:'Kategori',t:'select',opts:['Bahan Baku','Barang Jadi','Perlengkapan','Lainnya']},{k:'qty',l:'Stok',t:'number'},{k:'unit',l:'Satuan',t:'select',opts:['pcs','kg','liter','meter','set','box']},{k:'price',l:'Harga (Rp)',t:'number'},{k:'location',l:'Lokasi'}];if(col==='project')return [{k:'name',l:'Nama Proyek',t:'text',req:true},{k:'client',l:'Klien'},{k:'description',l:'Deskripsi'},{k:'value',l:'Nilai Kontrak (Rp)',t:'number'},{k:'start_date',l:'Mulai',t:'date'},{k:'end_date',l:'Selesai',t:'date'},{k:'status',l:'Status',t:'select',opts:['Berjalan','Selesai','Ditunda','Batal']},{k:'pic',l:'PIC/PJ'}];return [];}
function genFormHtml(col,data={}){return getGenFields(col).map(f=>{if(f.t==='select')return `<div class="fld"><label>${f.l}</label><select id="gen-${f.k}">${f.opts.map(o=>`<option${o===data[f.k]?' selected':''}>${o}</option>`).join('')}</select></div>`;return fld(f.l,'gen-'+f.k,f.t||'text',data[f.k]||'','','',(f.req||false));}).join('');}
function openAddGen(col,title){openModal('Tambah '+title,'<div>'+genFormHtml(col)+'</div><div class="btn-row"><button class="btn btn-ghost btn-flex1" onclick="closeModal()">Batal</button><button class="btn btn-primary btn-flex1" onclick="saveGen(\''+col+'\',\'\')">Simpan</button></div>');}
function openEditGen(col,id,title){const item=(S[col]||[]).find(r=>r.id===id);if(!item)return;openModal('Edit '+title,'<div>'+genFormHtml(col,item)+'</div><div class="btn-row"><button class="btn btn-ghost btn-flex1" onclick="closeModal()">Batal</button><button class="btn btn-primary btn-flex1" onclick="saveGen(\''+col+'\',\''+id+'\')">Perbarui</button></div>');}
function saveGen(col,editId){const fields=getGenFields(col);const data={};const req=fields.find(f=>f.req);fields.forEach(f=>{const el=document.getElementById('gen-'+f.k);if(el)data[f.k]=f.t==='number'?parseFloat(el.value)||0:el.value;});if(req&&!data[req.k]){showToast(req.l+' wajib diisi','warning');return;}if(editId)updItem(col,editId,data);else addItem(col,data);closeModal();goSubPage(col);}

function renderARAPPage(col,title,icon){const items=filtered(col);const total=items.reduce((s,r)=>s+(r.total||0),0);const outstanding=items.reduce((s,r)=>s+(r.total||0)-(r.paid_amount||0),0);const cards=items.map(item=>`<div class="item-card"><div class="flex-sb mb6"><div style="flex:1"><div style="font-size:12px;font-weight:700;color:#1e293b">${item.invoice_no||item.client_vendor||'—'}</div><div class="txt-xs mt4">${item.client_vendor||'—'} • ${item.date||'—'}</div>${item.due_date?`<div class="txt-xs" style="color:${new Date(item.due_date)<new Date()&&item.payment_status!=='Lunas'?'#dc2626':'#94a3b8'}">Jth Tempo: ${item.due_date}</div>`:''}</div><div class="flex-row"><button class="btn btn-xs" style="background:#fef3c7;color:#92400e" onclick="openEditARAP('${col}','${item.id}','${title}')">✏️</button><button class="btn btn-xs btn-danger" onclick="confirmDel('${col}','${item.id}',this)">🗑️</button></div></div><div class="flex-sb">${badge(item.payment_status)}<div style="text-align:right"><div style="font-size:13px;font-weight:800;color:#0f4c81">${fmtRp(item.total||0)}</div>${(item.total||0)-(item.paid_amount||0)>0?`<div class="txt-xs">Sisa: ${fmtRp((item.total||0)-(item.paid_amount||0))}</div>`:''}</div></div></div>`).join('');return `<div class="page-hdr"><div class="page-title">${icon} ${title}</div><button class="btn btn-primary btn-sm" onclick="openAddARAP('${col}','${title}')">+ Tambah</button></div><input class="search-box" placeholder="Cari ${title}..."><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:11px">${[['Total',total,'#0f4c81'],['Lunas',total-outstanding,'#16a34a'],['Outstanding',outstanding,'#d97706']].map(([l,v,c])=>`<div style="background:#fff;border-radius:10px;padding:9px;text-align:center;box-shadow:0 1px 3px rgba(15,76,129,.07)"><div style="font-size:9px;color:#94a3b8;font-weight:700;text-transform:uppercase">${l}</div><div style="font-size:11px;font-weight:800;color:${c};margin-top:2px">${fmtRp(v)}</div></div>`).join('')}</div>${cards||`<div style="text-align:center;padding:36px;color:#94a3b8;background:#fff;border-radius:14px"><div style="font-size:28px;margin-bottom:6px">${icon}</div><button class="btn btn-primary btn-sm" onclick="openAddARAP('${col}','${title}')">+ Tambah ${title}</button></div>`}`;}
function arapForm(col,data={}){const m=Filter.month||new Date().getMonth()+1,y=Filter.year||new Date().getFullYear();const isRec=col==='receivable';return `<div class="grid2">${fld('No. Invoice','ar-inv','text',data.invoice_no||'')}${fld('Tanggal','ar-date','date',data.date||today())}<div class="fld"><label>Bulan</label><select id="ar-month">${monthOpts(data.month||m)}</select></div>${fld('Tahun','ar-year','number',data.year||y)}</div>${fld(isRec?'Debitur *':'Kreditur *','ar-cv','text',data.client_vendor||'')}${fld('Keterangan','ar-desc','text',data.description||'')}${fld('Total (Rp)','ar-total','number',data.total||0)}${fld('Sudah Dibayar (Rp)','ar-paid','number',data.paid_amount||0)}${fld('Jatuh Tempo','ar-due','date',data.due_date||'')}<div class="fld"><label>Status</label><select id="ar-status">${['Belum Bayar','Sebagian','Lunas','Overdue'].map(o=>`<option${o===data.payment_status?' selected':''}>${o}</option>`).join('')}</select></div>`;}
function openAddARAP(col,title){openModal('Tambah '+title,arapForm(col)+'<div class="btn-row"><button class="btn btn-ghost btn-flex1" onclick="closeModal()">Batal</button><button class="btn btn-primary btn-flex1" onclick="saveARAP(\''+col+'\',\'\')">Simpan</button></div>');}
function openEditARAP(col,id,title){const item=(S[col]||[]).find(r=>r.id===id);if(!item)return;openModal('Edit '+title,arapForm(col,item)+'<div class="btn-row"><button class="btn btn-ghost btn-flex1" onclick="closeModal()">Batal</button><button class="btn btn-primary btn-flex1" onclick="saveARAP(\''+col+'\',\''+id+'\')">Perbarui</button></div>');}
function saveARAP(col,editId){const cv=getVal('ar-cv');if(!cv){showToast('Nama wajib diisi','warning');return;}const data={invoice_no:getVal('ar-inv'),date:getVal('ar-date'),month:+getVal('ar-month'),year:+getVal('ar-year'),client_vendor:cv,description:getVal('ar-desc'),total:getNum('ar-total'),paid_amount:getNum('ar-paid'),due_date:getVal('ar-due'),payment_status:getVal('ar-status')};if(editId)updItem(col,editId,data);else addItem(col,data);closeModal();goSubPage(col);}

function renderAsset(){const assets=S.asset||[];const yr=Filter.year||new Date().getFullYear();function getDep(a){const lf={Bangunan:20,Kendaraan:8,Mesin:4,Elektronik:4,Peralatan:4}[a.asset_type]||4;const ann=Math.round((a.asset_value||0)/lf);const yrs=Math.min(Math.max(0,yr-(+(a.acquisition_year||yr))),lf);return{ann,accum:ann*yrs,nv:Math.max(0,(a.asset_value||0)-ann*yrs)};}const cards=assets.map(a=>{const dep=getDep(a),pct=a.asset_value?Math.round(dep.accum/a.asset_value*100):0;return `<div class="item-card"><div class="flex-sb mb6"><div><div style="font-size:12px;font-weight:700;color:#1e293b">${a.name}</div><div class="txt-xs mt4">${a.asset_type||'—'} • ${a.acquisition_year||'—'}</div></div><div class="flex-row"><button class="btn btn-xs" style="background:#fef3c7;color:#92400e" onclick="openEditAsset('${a.id}')">✏️</button><button class="btn btn-xs btn-danger" onclick="confirmDel('asset','${a.id}',this)">🗑️</button></div></div><div class="flex-sb txt-sm mb2"><span>Perolehan</span><span style="font-weight:600">${fmtRp(a.asset_value||0)}</span></div><div class="flex-sb txt-sm mb5"><span>Dep/thn • Akum (${pct}%)</span><span style="color:#dc2626;font-weight:600">-${fmtRp(dep.ann)} • -${fmtRp(dep.accum)}</span></div><div class="progress-wrap mb5"><div class="progress-bar" style="background:${pct>80?'#dc2626':pct>50?'#d97706':'#16a34a'};width:${pct}%"></div></div><div class="flex-sb" style="font-size:12px;font-weight:800"><span>Nilai Buku</span><span style="color:${dep.nv>0?'#0f4c81':'#dc2626'}">${fmtRp(dep.nv)}</span></div></div>`;}).join('');return `<div class="page-hdr"><div class="page-title">🏗️ Aset Tetap</div><button class="btn btn-primary btn-sm" onclick="openAddAsset()">+ Tambah</button></div><input class="search-box" placeholder="Cari aset..."><div class="kpi-grid">${kpiCard('Nilai Perolehan',fmtRp(assets.reduce((s,a)=>s+(a.asset_value||0),0)),'#0f4c81','🏗️')}${kpiCard('Nilai Buku',fmtRp(assets.reduce((s,a)=>s+getDep(a).nv,0)),'#16a34a','💎')}</div>${cards||`<div style="text-align:center;padding:36px;color:#94a3b8;background:#fff;border-radius:14px"><div style="font-size:28px">🏗️</div><br><button class="btn btn-primary btn-sm" onclick="openAddAsset()">+ Tambah Aset</button></div>`}`;}
function assetForm(data={}){return `<div class="fld"><label>Nama Aset *</label><input type="text" id="ast-name" value="${data.name||''}"></div><div class="grid2"><div class="fld"><label>Jenis</label><select id="ast-type">${['Elektronik','Kendaraan','Bangunan','Mesin','Peralatan','Lainnya'].map(t=>`<option${t===data.asset_type?' selected':''}>${t}</option>`).join('')}</select></div><div class="fld"><label>Kondisi</label><select id="ast-cond">${['Baik','Sedang','Rusak'].map(t=>`<option${t===data.condition?' selected':''}>${t}</option>`).join('')}</select></div>${fld('Nilai Perolehan (Rp)','ast-val','number',data.asset_value||0)}${fld('Tahun Perolehan','ast-yr','number',data.acquisition_year||new Date().getFullYear())}</div>${fld('Lokasi','ast-loc','text',data.location||'')}${fld('Keterangan','ast-desc','text',data.description||'')}`;}
function openAddAsset(){openModal('Tambah Aset',assetForm()+'<div class="btn-row"><button class="btn btn-ghost btn-flex1" onclick="closeModal()">Batal</button><button class="btn btn-primary btn-flex1" onclick="saveAsset(\'\')">Simpan</button></div>');}
function openEditAsset(id){const a=(S.asset||[]).find(r=>r.id===id);if(!a)return;openModal('Edit Aset',assetForm(a)+'<div class="btn-row"><button class="btn btn-ghost btn-flex1" onclick="closeModal()">Batal</button><button class="btn btn-primary btn-flex1" onclick="saveAsset(\''+id+'\')">Perbarui</button></div>');}
function saveAsset(editId){const name=getVal('ast-name');if(!name){showToast('Nama wajib diisi','warning');return;}const data={name,asset_type:getVal('ast-type'),condition:getVal('ast-cond'),asset_value:getNum('ast-val'),acquisition_year:+getVal('ast-yr'),location:getVal('ast-loc'),description:getVal('ast-desc')};if(editId)updItem('asset',editId,data);else addItem('asset',data);closeModal();goSubPage('asset');}

function renderAttendance(){const items=filtered('attendance');const counts={Hadir:0,Sakit:0,Izin:0,Cuti:0,Alpha:0};items.forEach(r=>{if(r.status in counts)counts[r.status]++;});const cards=items.slice().reverse().map(item=>`<div class="item-card" style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:12px;font-weight:700;color:#1e293b">${item.employee_name}</div><div class="txt-xs">${item.date} • ${item.check_in||'—'} – ${item.check_out||'—'}</div></div><div style="display:flex;align-items:center;gap:5px">${badge(item.status)}<button class="btn btn-xs btn-danger" onclick="confirmDel('attendance','${item.id}',this)">🗑️</button></div></div>`).join('');return `<div class="page-hdr"><div class="page-title">📅 Absensi</div><button class="btn btn-primary btn-sm" onclick="openAddAtt()">+ Input</button></div><input class="search-box" placeholder="Cari absensi..."><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:12px">${Object.entries(counts).map(([s,c])=>`<div style="background:#fff;border-radius:9px;padding:7px 4px;text-align:center;box-shadow:0 1px 3px rgba(15,76,129,.06)"><div style="font-size:14px;font-weight:800;color:${s==='Hadir'?'#16a34a':s==='Alpha'?'#dc2626':'#d97706'}">${c}</div><div class="txt-xs">${s}</div></div>`).join('')}</div>${cards||`<div style="text-align:center;padding:32px;color:#94a3b8;font-size:12px">Belum ada data absensi</div>`}`;}
function openAddAtt(){const employees=S.employee||[];openModal('Input Absensi',`<div class="fld"><label>Karyawan *</label><select id="att-emp"><option value="">-- Pilih --</option>${employees.map(e=>`<option value="${e.name}">${e.name}</option>`).join('')}</select></div>${fld('Tanggal','att-date','date',today())}<div class="fld"><label>Status</label><select id="att-status">${['Hadir','Sakit','Izin','Cuti','Alpha'].map(o=>`<option>${o}</option>`).join('')}</select></div><div class="grid2">${fld('Jam Masuk','att-in','time','08:00')}${fld('Jam Keluar','att-out','time','17:00')}</div><div class="btn-row"><button class="btn btn-ghost btn-flex1" onclick="closeModal()">Batal</button><button class="btn btn-primary btn-flex1" onclick="saveAtt()">Simpan</button></div>`);}
function saveAtt(){const emp=getVal('att-emp');if(!emp){showToast('Pilih karyawan','warning');return;}const data={employee_name:emp,date:getVal('att-date'),status:getVal('att-status'),check_in:getVal('att-in'),check_out:getVal('att-out'),month:new Date(getVal('att-date')).getMonth()+1,year:new Date(getVal('att-date')).getFullYear()};addItem('attendance',data);closeModal();goSubPage('attendance');}

// ═══════════════ ACCOUNTING ═══════════════
function renderAccounting(){const F2=fin();const inc=filtered('income'),exp=filtered('expense'),pay=filtered('payroll');const yr=Filter.year||new Date().getFullYear();const piutang=inc.filter(i=>i.payment_status!=='Lunas').reduce((s,i)=>s+(i.total||0),0);const hutang=exp.filter(e=>e.payment_status!=='Lunas').reduce((s,e)=>s+(e.total||0),0);const assets=S.asset||[];const nilaiAset=assets.reduce((s,a)=>s+(a.asset_value||0),0);const depAset=assets.reduce((s,a)=>{const lf={Bangunan:20,Kendaraan:8}[a.asset_type]||4;return s+Math.round((a.asset_value||0)/lf*Math.max(0,yr-(+(a.acquisition_year||yr))));},0);const tab=CTab.acct||'laba';const labaRows=[{l:'Pendapatan Usaha',v:F2.gross,c:'#16a34a',bold:true},{l:'Beban Operasional',v:-F2.totalExp,c:'#dc2626'},{l:'Beban Gaji & Upah',v:-F2.totalPay,c:'#dc2626'},{l:'LABA OPERASIONAL',v:F2.net,c:'#0f4c81',bold:true},{l:'PPh Final (0.5%)',v:-F2.pphFinal,c:'#d97706'},{l:'LABA BERSIH',v:F2.netAfterTax,c:F2.netAfterTax>=0?'#16a34a':'#dc2626',bold:true,big:true}];const jurnalRows=[...inc.map(r=>({d:r.date||'—',k:r.client_vendor||'Pendapatan',db:r.total||0,cr:0})),...exp.map(r=>({d:r.date||'—',k:r.description||'Beban',db:0,cr:r.total||0})),...pay.map(r=>({d:MONTHS[r.month||1]+' '+r.year,k:'Gaji '+r.name,db:0,cr:r.netSalary||r.net_salary||0}))];return `<div class="page-title">📒 Akuntansi</div><div class="tab-row"><button class="tab-btn ${tab==='laba'?'active':''}" onclick="setAcctTab('laba')">Laba Rugi</button><button class="tab-btn ${tab==='neraca'?'active':''}" onclick="setAcctTab('neraca')">Neraca</button><button class="tab-btn ${tab==='jurnal'?'active':''}" onclick="setAcctTab('jurnal')">Jurnal</button></div>${tab==='laba'?`<div class="item-card"><div style="text-align:center;border-bottom:2px solid #e2e8f0;padding-bottom:8px;margin-bottom:10px"><div style="font-size:12px;font-weight:800">${S.settings.company_name}</div><div style="font-size:11px;font-weight:700">LAPORAN LABA RUGI</div><div class="txt-xs">Periode ${Filter.month?MONTHS[Filter.month]:''} ${Filter.year}</div></div>${labaRows.map((r,i)=>`<div class="flex-sb" style="padding:5px 0;border-top:${i?'1px solid #f8fafc':'none'}"><span style="font-size:11px;font-weight:${r.bold?700:400};color:#475569">${r.l}</span><span style="font-size:${r.big?13:11}px;font-weight:${r.bold?800:600};color:${r.c}">${r.v>=0?'+':''}${fmtRp(r.v)}</span></div>`).join('')}</div>`:tab==='neraca'?`<div class="item-card"><div style="text-align:center;border-bottom:2px solid #e2e8f0;padding-bottom:8px;margin-bottom:10px"><div style="font-size:11px;font-weight:800">NERACA</div><div class="txt-xs">${S.settings.company_name} • ${yr}</div></div><div class="grid2"><div><div style="font-size:11px;font-weight:800;color:#0f4c81;margin-bottom:6px">AKTIVA</div>${[['Kas & Bank',F2.netAfterTax],['Piutang Usaha',piutang],['Aset Tetap (Buku)',nilaiAset-depAset],['TOTAL AKTIVA',F2.netAfterTax+piutang+nilaiAset-depAset,true]].map(([l,v,b])=>`<div class="flex-sb" style="font-size:10px;padding:3px 0;font-weight:${b?800:400};border-top:${b?'1px solid #e2e8f0':'none'}"><span>${l}</span><span style="color:${b?'#0f4c81':'#1e293b'}">${fmtRp(v||0)}</span></div>`).join('')}</div><div><div style="font-size:11px;font-weight:800;color:#dc2626;margin-bottom:6px">PASIVA</div>${[['Hutang Usaha',hutang],['Ekuitas',F2.netAfterTax+piutang+nilaiAset-depAset-hutang],['TOTAL PASIVA',F2.netAfterTax+piutang+nilaiAset-depAset,true]].map(([l,v,b])=>`<div class="flex-sb" style="font-size:10px;padding:3px 0;font-weight:${b?800:400};border-top:${b?'1px solid #e2e8f0':'none'}"><span>${l}</span><span style="color:${b?'#0f4c81':'#1e293b'}">${fmtRp(v||0)}</span></div>`).join('')}</div></div></div>`:
`<div class="item-card"><div style="font-size:12px;font-weight:700;margin-bottom:8px">Jurnal Umum</div><div class="tbl-wrap"><table class="tbl" style="min-width:380px"><thead><tr>${['Tanggal','Keterangan','Debit','Kredit'].map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${jurnalRows.map(r=>`<tr><td>${r.d}</td><td>${r.k}</td><td style="color:#16a34a;font-weight:600">${r.db?fmtN(r.db):'—'}</td><td style="color:#dc2626;font-weight:600">${r.cr?fmtN(r.cr):'—'}</td></tr>`).join('')}</tbody></table></div></div>`}`;}
function setAcctTab(t){CTab.acct=t;goSubPage('accounting');}

// ═══════════════ SETTINGS ═══════════════
function renderSettings(){
  const tab=CTab.settings||'company';const s=S.settings;
  const MODULES=[{col:'income',lbl:'📈 Pendapatan'},{col:'expense',lbl:'📉 Pengeluaran'},{col:'employee',lbl:'👥 Karyawan'},{col:'payroll',lbl:'💰 Payroll'},{col:'loan',lbl:'🏦 Pinjaman'},{col:'loan_payment',lbl:'💳 Bayar Pinjaman'},{col:'receivable',lbl:'💳 Piutang'},{col:'payable',lbl:'🏦 Hutang'},{col:'client',lbl:'🤝 Klien'},{col:'vendor',lbl:'🏭 Vendor'},{col:'asset',lbl:'🏗️ Aset'},{col:'attendance',lbl:'📅 Absensi'},{col:'inventory',lbl:'📦 Inventori'},{col:'project',lbl:'📋 Proyek'},{col:'pph23',lbl:'🧾 PPh 23'}];
  return `<div class="page-title">⚙️ Pengaturan</div><div class="tab-row"><button class="tab-btn ${tab==='company'?'active':''}" onclick="setSettTab('company')">Perusahaan</button><button class="tab-btn ${tab==='bank'?'active':''}" onclick="setSettTab('bank')">Bank</button><button class="tab-btn ${tab==='users'?'active':''}" onclick="setSettTab('users')">Pengguna</button><button class="tab-btn ${tab==='backup'?'active':''}" onclick="setSettTab('backup')">Export/Import</button></div>
${tab==='company'?`<div class="item-card"><div style="font-size:12px;font-weight:700;margin-bottom:10px">📋 Data Perusahaan</div>${[['sett-name','Nama Perusahaan',s.company_name],['sett-tag','Tagline',s.company_tagline],['sett-npwp','NPWP Perusahaan',s.npwp],['sett-addr','Alamat',s.address],['sett-phone','Telepon',s.phone],['sett-email','Email',s.email]].map(([id,label,val])=>fld(label,id,'text',val||'')).join('')}<button class="btn btn-primary btn-w100" onclick="saveCompany()">Simpan</button></div>`:
tab==='bank'?`<div class="item-card"><div style="font-size:12px;font-weight:700;margin-bottom:10px">🏦 Rekening Bank</div>${[['sett-bank','Nama Bank',s.bank_name],['sett-accno','No. Rekening',s.account_number],['sett-holder','Atas Nama',s.account_holder]].map(([id,label,val])=>fld(label,id,'text',val||'')).join('')}<button class="btn btn-primary btn-w100" onclick="saveBank()">Simpan</button></div>`:
tab==='users'?`<div class="item-card mb12"><div style="font-size:12px;font-weight:700;margin-bottom:9px">👥 Pengguna</div>${S.users.map(u=>`<div class="flex-sb" style="padding:7px 0;border-bottom:1px solid #f1f5f9;font-size:12px"><div><div style="font-weight:600">${u.name}</div><div class="txt-xs">@${u.username} • ${u.role}</div></div>${badge(u.role==='admin'?'Aktif':'Berjalan')}</div>`).join('')}</div><div class="item-card"><div style="font-size:12px;font-weight:700;margin-bottom:9px">🔑 Ubah Password</div>${fld('Password Lama','pw-old','password','')}${fld('Password Baru','pw-new1','password','')}${fld('Konfirmasi','pw-new2','password','')}<button class="btn btn-primary btn-w100" onclick="changePw()">Ubah Password</button></div>`:
`<div><div class="item-card mb10"><div style="font-size:12px;font-weight:700;margin-bottom:9px">📊 Statistik Data</div><div class="grid2">${MODULES.map(({col,lbl})=>`<div style="background:#f8fafc;border-radius:8px;padding:7px 9px;display:flex;justify-content:space-between;align-items:center"><span class="txt-sm">${lbl}</span><span style="font-size:12px;font-weight:800;color:#0f4c81">${(S[col]||[]).length}</span></div>`).join('')}</div></div>
<div class="item-card mb10"><div style="font-size:12px;font-weight:800;margin-bottom:4px">📥 Export ke Excel (.xlsx)</div><div class="txt-sm mb10">Semua data dalam satu file dengan sheet terpisah per modul (termasuk PPh 23)</div><button class="btn btn-success btn-w100 mb8" onclick="exportAllExcel()">📥 Export SEMUA Data ke Excel</button><div style="font-size:11px;font-weight:700;color:#475569;margin-bottom:7px">Export per Modul:</div><div class="grid2">${MODULES.map(({col,lbl})=>`<button class="btn btn-ghost btn-sm" style="text-align:left;font-size:10px;display:flex;align-items:center;justify-content:space-between" onclick="exportSheet('${col}','${lbl}')">${lbl} <span class="txt-xs">${(S[col]||[]).length} baris</span></button>`).join('')}</div></div>
<div class="item-card mb10"><div style="font-size:12px;font-weight:800;margin-bottom:4px">📤 Import dari Excel (.xlsx)</div><div class="txt-sm mb6">Upload file Excel hasil export ERP. Data akan digabung (merge).</div><label class="upload-label"><span class="up-icon">📂</span><span class="up-text">Klik untuk Upload File Excel</span><span class="up-sub">Format: .xlsx atau .xls • Multi-sheet</span><input type="file" accept=".xlsx,.xls" style="display:none" onchange="importExcel(this)"></label><div id="import-status"></div></div>
<div class="item-card mb10"><div style="font-size:12px;font-weight:700;margin-bottom:8px">💾 Backup JSON</div><div class="grid2 mb8"><button class="btn btn-primary" onclick="exportJSON()">⬇️ Export JSON</button><label class="btn btn-primary" style="cursor:pointer;text-align:center">⬆️ Import JSON<input type="file" accept=".json" style="display:none" onchange="importJSON(this)"></label></div><div style="padding:12px;background:#fef2f2;border-radius:10px;border:1px solid #fecaca"><div style="font-size:11px;font-weight:700;color:#dc2626;margin-bottom:5px">⚠️ Reset Semua Data</div><button class="btn btn-danger btn-w100" onclick="resetAll()">🗑️ Reset Semua Data</button></div></div></div>`}`;
}
function setSettTab(t){CTab.settings=t;goSubPage('settings');}
function saveCompany(){S.settings={...S.settings,company_name:getVal('sett-name'),company_tagline:getVal('sett-tag'),npwp:getVal('sett-npwp'),address:getVal('sett-addr'),phone:getVal('sett-phone'),email:getVal('sett-email')};saveS();document.getElementById('hdr-name').textContent=S.settings.company_name;showToast('Disimpan ✓');}
function saveBank(){S.settings={...S.settings,bank_name:getVal('sett-bank'),account_number:getVal('sett-accno'),account_holder:getVal('sett-holder')};saveS();showToast('Disimpan ✓');}
function changePw(){const old=getVal('pw-old'),n1=getVal('pw-new1'),n2=getVal('pw-new2');const me=S.users.find(u=>u.id===CU.id);if(!me||me.password!==old){showToast('Password lama salah','warning');return;}if(n1!==n2){showToast('Password tidak cocok','warning');return;}if(n1.length<4){showToast('Min 4 karakter','warning');return;}S.users=S.users.map(u=>u.id===CU.id?{...u,password:n1}:u);saveS();showToast('Password diubah ✓');}

// EXCEL
function loadXLSX(cb){if(window.XLSX){cb();return;}const sc=document.createElement('script');sc.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';sc.onload=cb;sc.onerror=()=>showToast('Gagal muat Excel library','danger');document.head.appendChild(sc);}
const SHEET_MAP={income:'Pendapatan',expense:'Pengeluaran',employee:'Karyawan',payroll:'Payroll',client:'Klien',vendor:'Vendor',receivable:'Piutang',payable:'Hutang',asset:'Aset',inventory:'Inventori',project:'Proyek',attendance:'Absensi',loan:'Pinjaman',loan_payment:'Pembayaran_Pinjaman',pph23:'PPh_23'};
const SHEET_REV={'Pendapatan':'income','Pengeluaran':'expense','Karyawan':'employee','Payroll':'payroll','Klien':'client','Vendor':'vendor','Piutang':'receivable','Hutang':'payable','Aset':'asset','Inventori':'inventory','Proyek':'project','Absensi':'attendance','Pinjaman':'loan','Pembayaran_Pinjaman':'loan_payment','PPh_23':'pph23'};
function exportAllExcel(){loadXLSX(()=>{try{const XLSX=window.XLSX,wb=XLSX.utils.book_new();let total=0;Object.entries(SHEET_MAP).forEach(([col,name])=>{const data=(S[col]||[]).map(({id,createdAt,...r})=>r);const ws=data.length?XLSX.utils.json_to_sheet(data):XLSX.utils.aoa_to_sheet([['Belum ada data']]);if(data.length){ws['!cols']=Object.keys(data[0]).map(k=>({wch:Math.max(k.length+2,14)}));}XLSX.utils.book_append_sheet(wb,ws,name);total+=data.length;});XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet([S.settings]),'Pengaturan');XLSX.writeFile(wb,'ERP_Omega_'+new Date().toISOString().split('T')[0]+'.xlsx');showToast('Export '+total+' baris berhasil ✓');}catch(e){showToast('Gagal: '+e.message,'danger');}});}
function exportSheet(col,lbl){loadXLSX(()=>{try{const XLSX=window.XLSX,wb=XLSX.utils.book_new();const data=(S[col]||[]).map(({id,createdAt,...r})=>r);if(!data.length){showToast('Tidak ada data','warning');return;}const ws=XLSX.utils.json_to_sheet(data);ws['!cols']=Object.keys(data[0]).map(k=>({wch:Math.max(k.length+2,14)}));XLSX.utils.book_append_sheet(wb,ws,SHEET_MAP[col]||col);XLSX.writeFile(wb,'ERP_'+col+'_'+new Date().toISOString().split('T')[0]+'.xlsx');showToast('Export '+lbl+' ('+data.length+' baris) ✓');}catch(e){showToast('Gagal export','danger');}});}
function importExcel(input){const file=input.files[0];if(!file)return;const statusEl=document.getElementById('import-status');if(statusEl)statusEl.innerHTML='<div class="info-box">⏳ Memproses...</div>';loadXLSX(()=>{const reader=new FileReader();reader.onload=ev=>{try{const XLSX=window.XLSX,wb=XLSX.read(new Uint8Array(ev.target.result),{type:'uint8array'});let total=0;const skipped=[];wb.SheetNames.forEach(name=>{const col=SHEET_REV[name];if(!col){skipped.push(name);return;}const rows=XLSX.utils.sheet_to_json(wb.Sheets[name]);const valid=rows.filter(r=>Object.keys(r).length>0&&!r['Belum ada data']).map(r=>({...r,id:uid(),createdAt:new Date().toISOString()}));S[col]=[...(S[col]||[]),...valid];total+=valid.length;});saveS();const msg='✅ Import berhasil! '+total+' record'+(skipped.length?' ('+skipped.length+' sheet diabaikan)':'');if(statusEl)statusEl.innerHTML=`<div class="success-box">${msg}</div>`;showToast(msg);}catch(err){if(statusEl)statusEl.innerHTML=`<div style="background:#fef2f2;border-radius:9px;padding:8px;font-size:11px;color:#dc2626">❌ Gagal: ${err.message}</div>`;showToast('Import gagal','danger');}};reader.readAsArrayBuffer(file);});input.value='';}
function exportJSON(){const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='erp_omega_'+new Date().toISOString().split('T')[0]+'.json';a.click();showToast('Backup JSON berhasil ✓');}
function importJSON(input){const file=input.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);S={...DEFAULT_STORE,...d};saveS();showToast('Import JSON berhasil ✓');goSubPage('settings');}catch{showToast('File JSON tidak valid','danger');}};r.readAsText(file);input.value='';}
function resetAll(){if(confirm('HAPUS SEMUA DATA? Tidak bisa dibatalkan!')){const cfg=S.settings,users=S.users;S={...JSON.parse(JSON.stringify(DEFAULT_STORE)),settings:cfg,users};saveS();showToast('Data direset','warning');goSubPage('settings');}}

// ═══════════════ MORE MENU ═══════════════
function renderMore(){
  const items=[{id:'bank',icon:'🏦',label:'Bank & Pinjaman',desc:'Kelola kredit & cicilan'},{id:'pph23',icon:'🧾',label:'PPh Pasal 23',desc:'Bukti potong & SPT Masa'},{id:'employee',icon:'👥',label:'Karyawan',desc:'Data & profil'},{id:'payroll',icon:'💰',label:'Penggajian',desc:'Slip gaji otomatis'},{id:'attendance',icon:'📅',label:'Absensi',desc:'Kehadiran harian'},{id:'client',icon:'🤝',label:'Klien',desc:'Database klien'},{id:'vendor',icon:'🏭',label:'Vendor',desc:'Database vendor'},{id:'receivable',icon:'💳',label:'Piutang',desc:'Tagihan outstanding'},{id:'payable',icon:'🏦',label:'Hutang Usaha',desc:'Kewajiban bayar'},{id:'asset',icon:'🏗️',label:'Aset Tetap',desc:'Depresiasi aset'},{id:'inventory',icon:'📦',label:'Inventori',desc:'Stok barang'},{id:'project',icon:'📋',label:'Proyek',desc:'Manajemen proyek'},{id:'accounting',icon:'📒',label:'Akuntansi',desc:'Laporan keuangan'},...(CU&&CU.role==='admin'?[{id:'settings',icon:'⚙️',label:'Pengaturan',desc:'Konfigurasi & Backup'}]:[])];
  return `<div class="page-title">Menu Lainnya</div><div class="more-grid">${items.map(item=>`<button class="more-btn" onclick="goSubPage('${item.id}')"><span class="more-btn-icon">${item.icon}</span><span class="more-btn-label">${item.label}</span><span class="more-btn-desc">${item.desc}</span></button>`).join('')}</div>`;
}

// ═══════════════ DELETE ═══════════════
function confirmDel(col,id,btn){document.querySelectorAll('.del-confirm').forEach(el=>el.remove());const box=document.createElement('div');box.className='del-confirm';box.innerHTML=`<span class="del-text">Hapus data ini?</span><div><button class="btn btn-danger btn-sm" onclick="doDelete('${col}','${id}')">Hapus</button> <button class="btn btn-ghost btn-sm" onclick="this.closest('.del-confirm').remove()">Batal</button></div>`;btn.closest('.item-card')?.appendChild(box)||btn.closest('.item-card,div')?.appendChild(box);}
function doDelete(col,id){delItem(col,id);if(CPage==='dashboard')render();else if(CPage==='income'){document.getElementById('main').innerHTML=renderTxPage('income','Pendapatan','📈');}else if(CPage==='expense'){document.getElementById('main').innerHTML=renderTxPage('expense','Pengeluaran','📉');}else{const subMap={pph23:'pph23',bank:'bank',employee:'employee',payroll:'payroll',client:'client',vendor:'vendor',receivable:'receivable',payable:'payable',asset:'asset',attendance:'attendance',project:'project',inventory:'inventory',loan:'bank','loan_payment':'bank'};for(const[k,v] of Object.entries(subMap)){if(document.querySelector('[onclick*="'+k+'"]')){goSubPage(v);return;}}render();}}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
